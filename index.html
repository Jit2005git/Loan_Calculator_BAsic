<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <section class="calculator-card">
            <header>
                <h1>Loan Calculator</h1>
                <p class="subtitle">See your monthly payment instantly as you update the loan details.</p>
            </header>

            <div class="field">
                <label for="loan-amount">Loan Amount</label>
                <div class="input-group">
                    <span class="prefix">₹</span>
                    <input onchange="calculateLoan()" class="input" type="number" id="loan-amount" min="1" max="5000000" value="100000">
                </div>
            </div>

            <div class="field">
                <label for="currency">Currency</label>
                <select id="currency" class="currency-select" onchange="calculateLoan()">
                    <option value="INR">Indian Rupee (₹)</option>
                    <option value="USD">US Dollar ($)</option>
                    <option value="EUR">Euro (€)</option>
                    <option value="GBP">British Pound (£)</option>
                </select>
            </div>

            <div class="field">
                <label for="interest-rate">Interest Rate</label>
                <div class="input-group">
                    <input onchange="calculateLoan()" class="input" type="number" id="interest-rate" min="0" max="100" value="10" step="0.1">
                    <span class="suffix">%</span>
                </div>
            </div>

            <div class="field">
                <label for="months-to-pay">Months to Pay</label>
                <input onchange="calculateLoan()" class="input" type="number" id="months-to-pay" min="6" max="48" value="12">
            </div>

            <div class="result-card">
                <p class="result-label">Monthly Payment</p>
                <p class="payment" id="payment">₹0.00</p>
            </div>
        </section>
    </div>

    <script src="index.js"></script>
</body>
</html>
